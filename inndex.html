<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart RO Filtration Water Plant</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      color: #003366;
      margin-bottom: 5px;
    }

    p {
      color: #333;
      margin-bottom: 20px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input {
      width: 90%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

  <h1>💧 Smart RO Water Plant</h1>
  <p>Order 20L water cans with location-based delivery</p>

  <div class="container">
    <form id="waterForm">
      <label>Number of 20L Water Tins</label>
      <input type="number" id="tins" min="1" required />

      <button type="submit">📍 Order Now</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const plantLat = 16.672952799189588;
    const plantLng = 82.15428739656774;

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    document.getElementById("waterForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const tins = document.getElementById("tins").value;
      const message = document.getElementById("message");
      const currentHour = new Date().getHours();

      message.className = "message";

      if (!tins || tins <= 0) {
        message.textContent = "Please enter valid number of tins.";
        message.classList.add("error");
        return;
      }

      if (currentHour < 6 || currentHour >= 20) {
        message.textContent = "Service available only between 6 AM and 8 PM.";
        message.classList.add("error");
        return;
      }

      if (navigator.geolocation) {
        message.textContent = "Fetching location...";

        navigator.geolocation.getCurrentPosition(function(position) {
          const userLat = position.coords.latitude;
          const userLng = position.coords.longitude;

          const distance = calculateDistance(userLat, userLng, plantLat, plantLng);

          if (distance <= 5) {
            message.textContent = `✅ Order placed for ${tins} tin(s)!`;
            message.classList.add("success");
          } else {
            message.textContent = "❌ Service not available in your area.";
            message.classList.add("error");
          }
        }, function() {
          message.textContent = "Please allow location access.";
          message.classList.add("error");
        });
      } else {
        message.textContent = "Geolocation not supported.";
        message.classList.add("error");
      }
    });
  </script>

</body>
</html>
