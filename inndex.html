<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart RO Water Plant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f9ff;
    }

    header {
      background: #0077b6;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #023e8a;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 20px;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .btn {
      background: #0077b6;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    footer {
      background: #023e8a;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Smart RO Filtration Water Plant</h1>
  <p>Clean & Safe Drinking Water</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#order">Order</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero" id="home">
  <h2>Pure Water Delivered to Your Home</h2>
  <p>Order 20L water cans easily</p>
</section>

<section id="order">
  <h2 style="text-align:center;">Order Water</h2>

  <form onsubmit="placeOrder(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="location" placeholder="Your Location" required>

    <select id="quantity">
      <option value="">Select Quantity</option>
      <option>1 Can</option>
      <option>2 Cans</option>
      <option>3 Cans</option>
      <option>5 Cans</option>
    </select>

    <button class="btn">Place Order</button>
  </form>
</section>

<section id="contact">
  <h2 style="text-align:center;">Contact</h2>
  <p style="text-align:center;">📞 9876543210</p>
</section>

<footer>
  <p>© 2026 Smart RO Water Plant</p>
</footer>

<script>
  function placeOrder(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let location = document.getElementById("location").value;
    let quantity = document.getElementById("quantity").value;

    alert("Order placed successfully!\nName: " + name +
          "\nLocation: " + location +
          "\nQuantity: " + quantity);
  }
</script>

</body>
</html>
